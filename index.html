<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Countdown</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

body{
margin:0;
font-family: "Comic Sans MS";
background:#FFD84D;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

/* CARD */
.container{
background:white;
padding:25px;
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,0.2);
text-align:center;
max-width:360px;
width:90%;
}

/* TITLE */
#title{
font-size:28px;
margin-bottom:10px;
}

/* CALENDAR */
.calendar{
width:100%;
max-width:260px;
margin:10px 0;
border-radius:15px;
}

/* TIMER */
#timer{
font-size:28px;
font-weight:bold;
margin:5px 0 10px 0;
}

/* GIF */
.couple{
width:120px;
margin:10px auto;
display:block;
}

/* GALLERY */
.gallery{
display:flex;
gap:10px;
justify-content:center;
margin-top:10px;
}

.gallery img{
width:70px;
height:70px;
border-radius:10px;
object-fit:cover;
}

/* BUTTON */
button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:#ff4d6d;
color:white;
font-size:16px;
cursor:pointer;
}

/* HEARTS */
.heart{
position:fixed;
top:-10px;
font-size:18px;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh)}
100%{transform:translateY(110vh)}
}

</style>
</head>


<body>

<div class="container">

<div id="title">Birthday Countdown ❤️</div>

<img src="calendar.png" class="calendar">

<div id="timer"></div>

<img class="couple" src="https://media.tenor.com/6Z0fQ8qN8L8AAAAi/couple-hug.gif">

<div class="gallery">
<img src="love1.jpeg">
<img src="love 2.jpeg">
<img src="love 3.jpeg">
<img src="love4.jpeg">
</div>

<button onclick="playSong()">Play Our Song ❤️</button>

</div>


<script>

/* BIRTHDAY DATE */
const birthday = new Date(new Date().getFullYear(),3,11);


/* TIMER */
function updateTimer(){

const now = new Date().getTime();
const distance = birthday - now;

const days = Math.floor(distance/(1000*60*60*24));
const hours = Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance%(1000*60*60))/(1000*60));
const seconds = Math.floor((distance%(1000*60))/1000);

const month = new Date().getMonth();
const date = new Date().getDate();

const title = document.getElementById("title");

if(month==3 && date==11){
title.innerHTML="🎉 HAPPY BIRTHDAY MY LOVE 🎉";
document.getElementById("timer").innerHTML="";
startConfetti();
}
else if(month==3 && date>=6 && date<11){
title.innerHTML="Your Birthday Week Started ❤️";
document.getElementById("timer").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}
else if(month==3 && date>=1 && date<6){
title.innerHTML="Your Birthday Month Started ❤️";
document.getElementById("timer").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}
else{
document.getElementById("timer").innerHTML=
days+"d "+hours+"h "+minutes+"m "+seconds+"s";
}

}

setInterval(updateTimer,1000);


/* CONFETTI */
function startConfetti(){
setInterval(function(){
confetti({
particleCount:150,
spread:120,
origin:{y:0.6}
});
},1500);
}


/* SONG */
function playSong(){
var audio = new Audio("oursong.mp3");
audio.play();
}


/* FALLING HEARTS */
function createHearts(){

const heart = document.createElement("div");

heart.classList.add("heart");
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

}

setInterval(createHearts,300);

updateTimer();

</script>

</body>
</html>
